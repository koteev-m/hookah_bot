name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-ktlint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-key-prefix: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - name: Run ktlint
        run: ./gradlew --no-daemon :backend:app:ktlintCheck --console=plain

  backend-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-key-prefix: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - name: Compile backend
        run: ./gradlew --no-daemon :backend:app:compileKotlin --console=plain

  backend-release-critical-routes:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: true
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-key-prefix: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - name: Verify Docker availability (required for Testcontainers)
        run: docker info
      - name: Run guest venue platform route tests
        run: |
          ./gradlew --no-daemon :backend:app:test \
            --tests "GuestVenueRoutesTest" \
            --tests "GuestOrderRoutesTest" \
            --tests "GuestTableResolveRoutesTest" \
            --tests "VenueOrderRoutesTest" \
            --tests "PlatformVenueRoutesTest" \
            --console=plain

  backend-venue-booking-rbac:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-key-prefix: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - name: Verify Docker availability (required for Testcontainers)
        run: docker info
      - name: Run venue booking RBAC tests
        run: |
          ./gradlew --no-daemon :backend:app:test \
            --tests "VenueBookingRoutesTest" \
            --tests "VenueRbacRoutesTest" \
            --console=plain

  backend-telegram-lightweight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-key-prefix: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - name: Run Telegram keyboard payload notifier tests
        run: |
          ./gradlew --no-daemon :backend:app:test \
            --tests "TelegramKeyboardsTest" \
            --tests "SendMessagePayloadTest" \
            --tests "StaffChatNotifierTest" \
            --tests "TelegramBotRouterLinkCommandTest" \
            --console=plain

  backend-migration-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        java: [21]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-key-prefix: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - name: Verify Docker availability (required for Testcontainers)
        run: docker info
      - name: Run migration sanity tests
        run: |
          ./gradlew --no-daemon :backend:app:test \
            --tests "TelegramDialogStateMigrationTest" \
            --tests "TableSessionsMigrationV28PostgresTest" \
            --console=plain

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - backend-ktlint
      - backend-compile
      - backend-release-critical-routes
      - backend-venue-booking-rbac
      - backend-telegram-lightweight
      - backend-migration-sanity
    steps:
      - name: Aggregate backend checks
        run: |
          echo "backend-ktlint result: ${{ needs.backend-ktlint.result }}"
          echo "backend-compile result: ${{ needs.backend-compile.result }}"
          echo "backend-release-critical-routes result: ${{ needs.backend-release-critical-routes.result }}"
          echo "backend-venue-booking-rbac result: ${{ needs.backend-venue-booking-rbac.result }}"
          echo "backend-telegram-lightweight result: ${{ needs.backend-telegram-lightweight.result }}"
          echo "backend-migration-sanity result: ${{ needs.backend-migration-sanity.result }}"

          if [[ "${{ needs.backend-ktlint.result }}" != "success" || \
                "${{ needs.backend-compile.result }}" != "success" || \
                "${{ needs.backend-release-critical-routes.result }}" != "success" || \
                "${{ needs.backend-venue-booking-rbac.result }}" != "success" || \
                "${{ needs.backend-telegram-lightweight.result }}" != "success" || \
                "${{ needs.backend-migration-sanity.result }}" != "success" ]]; then
            echo "backend checks failed"
            exit 1
          fi

          echo "backend checks passed"

  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create CI compose env
        run: |
          cat > .env <<'EOF'
          POSTGRES_DB=hookah
          POSTGRES_USER=hookah
          POSTGRES_PASSWORD=ci-placeholder-password
          EOF
      - name: Validate Docker Compose config
        run: docker compose config --quiet

  miniapp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        node: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - name: Detect miniapp lockfile
        id: miniapp-lockfile
        run: |
          cd miniapp
          lockfiles=()
          if [ -f pnpm-lock.yaml ]; then
            lockfiles+=("pnpm-lock.yaml")
          fi
          if [ -f package-lock.json ]; then
            lockfiles+=("package-lock.json")
          fi
          if [ -f yarn.lock ]; then
            lockfiles+=("yarn.lock")
          fi
          if [ ${#lockfiles[@]} -eq 0 ]; then
            echo "::error::No lockfile found in miniapp/. Expected pnpm-lock.yaml, package-lock.json, or yarn.lock."
            exit 1
          fi
          if [ ${#lockfiles[@]} -gt 1 ]; then
            echo "::warning::Multiple lockfiles detected in miniapp/: ${lockfiles[*]}. Using priority pnpm > npm > yarn."
          fi
          if [ -f pnpm-lock.yaml ]; then
            echo "package_manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "package_manager=npm" >> "$GITHUB_OUTPUT"
          else
            echo "package_manager=yarn" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up pnpm
        if: steps.miniapp-lockfile.outputs.package_manager == 'pnpm'
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: 9
      - name: Install dependencies
        working-directory: miniapp
        run: |
          case "${{ steps.miniapp-lockfile.outputs.package_manager }}" in
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            npm)
              npm ci
              ;;
            yarn)
              corepack enable
              yarn install --frozen-lockfile
              ;;
            *)
              echo "::error::Unknown package manager."
              exit 1
              ;;
          esac
      - name: Build miniapp
        working-directory: miniapp
        run: |
          case "${{ steps.miniapp-lockfile.outputs.package_manager }}" in
            pnpm)
              pnpm build
              ;;
            npm)
              npm run build
              ;;
            yarn)
              yarn build
              ;;
            *)
              echo "::error::Unknown package manager."
              exit 1
              ;;
          esac

  miniapp-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        node: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        working-directory: miniapp
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: miniapp
        run: npx playwright install --with-deps chromium
      - name: Run Mini App browser smoke
        working-directory: miniapp
        run: npm run e2e:smoke

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        target: [backend]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile .
