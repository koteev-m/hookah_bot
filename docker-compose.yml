services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-hookah_bot_ant-backend:staging}
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_BACKEND_PUBLIC_URL: ${VITE_BACKEND_PUBLIC_URL:-http://localhost:8080}
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_VERSION: ${APP_VERSION:-dev}
      APP_HTTP_PORT: ${APP_HTTP_PORT:-8080}
      API_SESSION_JWT_SECRET: ${API_SESSION_JWT_SECRET:-local-dev-jwt-secret}
      API_SESSION_TTL_SECONDS: ${API_SESSION_TTL_SECONDS:-3600}
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_MODE: ${TELEGRAM_BOT_MODE:-long_polling}
      TELEGRAM_WEBHOOK_PATH: ${TELEGRAM_WEBHOOK_PATH:-/telegram/webhook}
      TELEGRAM_WEBHOOK_SECRET_TOKEN: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
      TELEGRAM_WEBAPP_PUBLIC_URL: ${TELEGRAM_WEBAPP_PUBLIC_URL:-http://localhost:8080/miniapp/}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      PLATFORM_OWNER_TELEGRAM_ID: ${PLATFORM_OWNER_TELEGRAM_ID:-}
      PLATFORM_OWNER_USER_ID: ${PLATFORM_OWNER_USER_ID:-}
      TELEGRAM_STAFF_CHAT_LINK_SECRET_PEPPER: ${TELEGRAM_STAFF_CHAT_LINK_SECRET_PEPPER:-local-dev-pepper}
      TELEGRAM_REQUIRE_STAFF_CHAT_ADMIN: ${TELEGRAM_REQUIRE_STAFF_CHAT_ADMIN:-true}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-false}
      MINIAPP_DEV_SERVER_URL: ${MINIAPP_DEV_SERVER_URL:-}
      MINIAPP_STATIC_DIR: ${MINIAPP_STATIC_DIR:-/app/miniapp}
      DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ALLOWED_HOSTS: ${CORS_ALLOWED_HOSTS:-}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
